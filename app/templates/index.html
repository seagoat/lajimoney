{% extends "base.html" %}

{% block content %}
<div class="stat-grid">
    <div class="stat-card">
        <div class="stat-value {% if overview.total_profit >= 0 %}profit{% else %}loss{% endif %}">
            {{ "%.2f"|format(overview.total_profit) }}
        </div>
        <div class="stat-label">累计收益（元）</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">{{ "%.1f"|format(overview.win_rate) }}%</div>
        <div class="stat-label">历史胜率</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">{{ overview.total_trades }}</div>
        <div class="stat-label">总成交笔数</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">{{ overview.pending_count }}</div>
        <div class="stat-label">当前持仓</div>
    </div>
</div>

<div class="card" style="margin-top: 20px;">
    <h2>扫描监控</h2>
    <p id="currentSettings" style="margin-bottom:8px;color:#888;font-size:13px;">
        加载中...
    </p>
    <button id="scanBtn" class="btn btn-primary" onclick="triggerScan()"
            style="margin-top: 5px;">手动触发扫描</button>
    <div id="scanProgress" style="margin-top: 15px; display: none;">
        <div id="scanStatus" style="margin-bottom: 8px; color: #555; font-size: 14px;"></div>
        <div id="progressBar" style="height: 6px; background: #eee; border-radius: 3px;">
            <div id="progressFill" style="height: 100%; background: #3498db; border-radius: 3px; width: 0%; transition: width 0.3s;"></div>
        </div>
        <div id="logContainer" style="margin-top: 12px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px;">
        </div>
    </div>
    <div id="scanResult" style="margin-top: 15px; display: none;"></div>
</div>

<div class="card">
    <h2>快速操作</h2>
    <p><a href="/holdings">管理底仓</a> | <a href="/signals">查看信号</a> | <a href="/trades">成交记录</a></p>
</div>

<script>
// 表格排序功能
let sortState = {};

function makeSortable(tableId) {
    sortState[tableId] = { column: null, direction: 'asc' };
    const headers = document.querySelectorAll(`#${tableId} th[data-sort]`);
    headers.forEach(th => {
        th.style.cursor = 'pointer';
        th.title = '点击排序';
        th.addEventListener('click', () => {
            const col = th.dataset.sort;
            if (sortState[tableId].column === col) {
                sortState[tableId].direction = sortState[tableId].direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState[tableId] = { column: col, direction: 'asc' };
            }
            sortTable(tableId, col, sortState[tableId].direction);
        });
        if (!th.querySelector('.sort-indicator')) {
            th.innerHTML += ' <span class="sort-indicator" style="font-size:10px;color:#ccc;"></span>';
        }
    });
}

function sortTable(tableId, col, direction) {
    const tbody = document.querySelector(`#${tableId} tbody`);
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const colIndex = Array.from(document.querySelectorAll(`#${tableId} th[data-sort]`)).findIndex(th => th.dataset.sort === col);

    rows.sort((a, b) => {
        let aVal = a.cells[colIndex]?.textContent.trim() || '';
        let bVal = b.cells[colIndex]?.textContent.trim() || '';
        const aNum = parseFloat(aVal.replace(/[^\d.-]/g, ''));
        const bNum = parseFloat(bVal.replace(/[^\d.-]/g, ''));
        if (!isNaN(aNum) && !isNaN(bNum)) {
            return direction === 'asc' ? aNum - bNum : bNum - aNum;
        }
        return direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    });

    rows.forEach(row => tbody.appendChild(row));
    document.querySelectorAll(`#${tableId} th .sort-indicator`).forEach(el => el.textContent = '');
    const activeHeader = document.querySelector(`#${tableId} th[data-sort="${col}"] .sort-indicator`);
    if (activeHeader) activeHeader.textContent = direction === 'asc' ? ' ▲' : ' ▼';
}

let currentEventSource = null;

// 加载并显示当前设置
async function loadCurrentSettings() {
    try {
        const res = await fetch('/api/settings');
        const s = await res.json();
        const modeText = s.scan_mode === 'all' ? '全市场转债' : '仅持仓正股';
        document.getElementById('currentSettings').textContent =
            `当前模式: ${modeText} | 折价阈值: ${s.discount_threshold}% | 每次买入: ${s.target_lot_size}张`;
    } catch (e) {
        document.getElementById('currentSettings').textContent = '设置加载失败';
    }
}
loadCurrentSettings();

function log(message, type) {
    const container = document.getElementById('logContainer');
    const line = document.createElement('div');
    line.style.padding = '3px 0';
    line.style.borderBottom = '1px solid #f0f0f0';
    if (type === 'error') {
        line.style.color = '#e74c3c';
    } else if (type === 'success') {
        line.style.color = '#27ae60';
    } else if (type === 'signal') {
        line.style.color = '#27ae60';
        line.style.fontWeight = 'bold';
    } else {
        line.style.color = '#777';
    }
    const time = new Date().toLocaleTimeString('zh-CN');
    line.textContent = `[${time}] ${message}`;
    container.appendChild(line);
    container.scrollTop = container.scrollHeight;
}

function renderOpportunityTable(data) {
    const tbody = document.getElementById('opportunityTableBody');
    if (!tbody) return;
    tbody.innerHTML = '';

    for (const sig of data) {
        const isSignal = sig.status === 'signal_found';
        const buyPrice = sig.target_buy_price || sig.cb_price || 0;
        const targetShares = sig.target_shares || 0;
        const stockPrice = sig.stock_price || 0;
        const conversionPrice = sig.conversion_price || 1;

        const holdingsBadge = sig.has_holdings
            ? '<span style="background:#27ae60;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">有</span>'
            : '<span style="background:#bbb;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">无</span>';

        let cost = 0, profit = 0, riskLevel = '', steps = '-', strategyLabel = '';
        if (isSignal) {
            const cbAmount = buyPrice * targetShares;
            const sharesFromCb = (targetShares * 100.0) / conversionPrice;
            const strategy = sig.trade_type || 'HEDGE';

            if (strategy === 'HEDGE') {
                const stockSellAmount = stockPrice * sharesFromCb;
                const cbFee = cbAmount * 0.00006 * 2;
                const stockFee = stockSellAmount * 0.0001;
                const stampTax = stockSellAmount * 0.0015;
                cost = cbAmount + cbFee + stockFee + stampTax;
                profit = stockSellAmount - cost;
                riskLevel = '<span style="color:#27ae60;">低</span>';
                steps = '买入CB → 转股 → 卖出正股';
                strategyLabel = '<span style="background:#27ae60;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">对冲</span>';
            } else if (strategy === 'SHORT') {
                const loanSellAmount = stockPrice * sharesFromCb;
                const cbFee = cbAmount * 0.00006;
                const loanFee = loanSellAmount * 0.0001;
                const interest = loanSellAmount * 0.00022 * 1;
                cost = cbAmount + cbFee + loanFee + interest;
                profit = loanSellAmount - cost;
                riskLevel = '<span style="color:#27ae60;">低</span>';
                steps = '买入CB → 申请融券卖出正股 → 转股归还融券';
                strategyLabel = '<span style="background:#3498db;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">融券</span>';
            } else {
                const stockSellAmount = stockPrice * sharesFromCb;
                const cbFee = cbAmount * 0.00006;
                const stockFee = stockSellAmount * 0.0001;
                cost = cbAmount + cbFee + stockFee;
                profit = stockSellAmount - cost;
                riskLevel = '<span style="color:#e74c3c;">高</span>';
                steps = '买入CB → 转股 → 次日卖出正股（注意隔夜风险）';
                strategyLabel = '<span style="background:#f39c12;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">裸套</span>';
            }
        } else {
            strategyLabel = '<span style="background:#bbb;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">无机会</span>';
            riskLevel = '-';
        }

        const profitRate = cost > 0 ? (profit / cost * 100).toFixed(2) + '%' : '-';
        const premium = sig.premium_rate != null ? sig.premium_rate.toFixed(2) + '%' : '-';
        const discount = sig.discount_space != null ? sig.discount_space.toFixed(2) : '-';
        const cbInfo = sig.cb_name ? `${sig.cb_name} (${sig.cb_code})` : (sig.cb_code || '-');
        const stockInfo = sig.stock_name ? `${sig.stock_name} (${sig.stock_code})` : (sig.stock_code || '-');
        const isProfit = profit >= 0;
        const rowStyle = isSignal ? '' : 'opacity:0.6;';
        const tradeType = isSignal ? (sig.trade_type || 'HEDGE') : 'none';

        tbody.innerHTML += `<tr data-strategy="${tradeType}" data-premium="${sig.premium_rate != null ? sig.premium_rate : ''}" data-holdings="${sig.has_holdings ? 'yes' : 'no'}" style="${rowStyle}">
            <td>${cbInfo}</td>
            <td>${stockInfo}</td>
            <td>${holdingsBadge}</td>
            <td>${strategyLabel}</td>
            <td class="${sig.premium_rate < 0 ? 'profit' : 'loss'}">${premium}</td>
            <td>${discount}</td>
            <td>${isSignal ? buyPrice.toFixed(2) : '-'}</td>
            <td>${isSignal ? targetShares : '-'}</td>
            <td>${isSignal ? cost.toFixed(2) : '-'}</td>
            <td class="${isSignal ? (isProfit ? 'profit' : 'loss') : ''}">${isSignal ? profit.toFixed(2) : '-'}</td>
            <td class="${isSignal ? (isProfit ? 'profit' : 'loss') : ''}">${isSignal ? profitRate : '-'}</td>
            <td>${riskLevel}</td>
            <td style="font-size:12px;">${steps}</td>
        </tr>`;
    }

    const filterCount = document.getElementById('filterCount');
    if (filterCount) {
        filterCount.textContent = `显示 ${data.length} / ${(window._allScanned || []).length}`;
    }
}

function applyFilters() {
    const strategySelected = Array.from(document.querySelectorAll('.filter-strategy:checked')).map(o => o.value);
    const premiumFilter = document.getElementById('filterPremium')?.value || 'all';
    const holdingsFilter = document.getElementById('filterHoldings')?.value || 'all';
    const tbody = document.getElementById('opportunityTableBody');
    if (!tbody) return;

    const strategySet = new Set(strategySelected);

    let visibleCount = 0;
    for (const row of tbody.querySelectorAll('tr')) {
        const rowStrategy = row.dataset.strategy;
        const rowPremium = parseFloat(row.dataset.premium);
        const rowHoldings = row.dataset.holdings;

        let show = true;

        if (strategySelected.length > 0 && !strategySet.has(rowStrategy)) show = false;
        if (premiumFilter === 'negative' && rowPremium >= 0) show = false;
        if (premiumFilter === 'positive' && rowPremium <= 0) show = false;
        if (holdingsFilter === 'yes' && rowHoldings !== 'yes') show = false;
        if (holdingsFilter === 'no' && rowHoldings !== 'no') show = false;

        row.style.display = show ? '' : 'none';
        if (show) visibleCount++;
    }

    const filterCount = document.getElementById('filterCount');
    if (filterCount) {
        const total = window._allScanned ? window._allScanned.length : 0;
        filterCount.textContent = `显示 ${visibleCount} / ${total}`;
    }
}

function triggerScan() {
    if (currentEventSource) {
        currentEventSource.close();
    }
    if (!confirm('确定要触发一次扫描吗？')) return;

    const btn = document.getElementById('scanBtn');
    const progressDiv = document.getElementById('scanProgress');
    const resultDiv = document.getElementById('scanResult');
    const statusDiv = document.getElementById('scanStatus');
    const progressFill = document.getElementById('progressFill');
    const logContainer = document.getElementById('logContainer');

    btn.disabled = true;
    btn.textContent = '扫描中...';
    progressDiv.style.display = 'block';
    resultDiv.style.display = 'none';
    logContainer.innerHTML = '';
    statusDiv.textContent = '正在连接...';
    progressFill.style.width = '0%';

    const es = new EventSource('/api/signals/scan-stream');
    currentEventSource = es;
    let finalResult = null;

    es.addEventListener('start', function(e) {
        const data = JSON.parse(e.data);
        statusDiv.textContent = data.message;
        log(data.message);
        loadCurrentSettings(); // 刷新显示最新设置
    });

    es.addEventListener('step', function(e) {
        const step = JSON.parse(e.data);
        log(step.message);

        if (step.status === 'signal_found') {
            log(`  → 发现机会：${step.cb_name} ${step.target_shares || 10}张 @ ${step.cb_price} [${step.trade_type || 'HEDGE'}]`, 'signal');
        }

        const pct = Math.round((step.step / step.total) * 100);
        progressFill.style.width = pct + '%';
        statusDiv.textContent = `正在扫描 ${step.step}/${step.total}：${step.stock_code}`;
    });

    let isDone = false;

    es.addEventListener('done', function(e) {
        isDone = true;
        const data = JSON.parse(e.data);
        finalResult = data;
        progressFill.style.width = '100%';
        statusDiv.textContent = '扫描完成';
        btn.disabled = false;
        btn.textContent = '手动触发扫描';
        es.close();
        currentEventSource = null;

        const resultDiv2 = document.getElementById('scanResult');
        resultDiv2.style.display = 'block';

        const allScanned = finalResult.all_scanned || [];
        if (allScanned.length === 0) {
            resultDiv2.innerHTML = '<p>扫描完成，无符合条件数据。</p>';
            return;
        }

        const opportunityCount = allScanned.filter(s => s.status === 'signal_found').length;

        let html = `<p class="profit"><strong>扫描完成，共扫描 ${allScanned.length} 只转债，发现 ${opportunityCount} 个套利机会：</strong></p>`;

        // 筛选控件
        html += `<div style="margin:10px 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span>策略:</span>
                <label style="display:inline-flex;align-items:center;gap:3px;cursor:pointer;"><input type="checkbox" class="filter-strategy" value="HEDGE" onchange="applyFilters()" checked>对冲</label>
                <label style="display:inline-flex;align-items:center;gap:3px;cursor:pointer;"><input type="checkbox" class="filter-strategy" value="SHORT" onchange="applyFilters()" checked>融券</label>
                <label style="display:inline-flex;align-items:center;gap:3px;cursor:pointer;"><input type="checkbox" class="filter-strategy" value="NAKED" onchange="applyFilters()" checked>裸套</label>
                <label style="display:inline-flex;align-items:center;gap:3px;cursor:pointer;"><input type="checkbox" class="filter-strategy" value="none" onchange="applyFilters()">无机会</label>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <span>溢价:</span>
                <select id="filterPremium" onchange="applyFilters()" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;">
                    <option value="all">全部</option>
                    <option value="negative">负溢价</option>
                    <option value="positive">正溢价</option>
                </select>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <span>底仓:</span>
                <select id="filterHoldings" onchange="applyFilters()" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;">
                    <option value="all">全部</option>
                    <option value="yes">有底仓</option>
                    <option value="no">无底仓</option>
                </select>
            </div>
            <span id="filterCount" style="color:#888;font-size:12px;"></span>
        </div>`;

        html += `<table id="opportunityTable" style="margin-top:10px;width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
                <tr style="background:#f5f5f5;">
                    <th data-sort="cb">转债</th>
                    <th data-sort="stock">正股</th>
                    <th data-sort="holdings">底仓</th>
                    <th data-sort="strategy">策略</th>
                    <th data-sort="premium">溢价率</th>
                    <th data-sort="discount">折价空间</th>
                    <th data-sort="buyPrice">目标买入价</th>
                    <th data-sort="shares">目标张数</th>
                    <th data-sort="cost">预估成本(元)</th>
                    <th data-sort="profit">预估收益(元)</th>
                    <th data-sort="profitRate">预估收益率</th>
                    <th data-sort="risk">风险等级</th>
                    <th>操作步骤</th>
                </tr>
            </thead>
            <tbody id="opportunityTableBody">
            </tbody>
        </table>`;
        resultDiv2.innerHTML = html;

        // 保存原始数据供筛选用
        window._allScanned = allScanned;

        renderOpportunityTable(allScanned);
        makeSortable('opportunityTable');
    });

    es.onerror = function() {
        if (isDone) return;
        es.close();
        currentEventSource = null;
        btn.disabled = false;
        btn.textContent = '手动触发扫描';
        statusDiv.textContent = '连接中断';
        log('连接中断', 'error');
    };

    // 超时兜底：60秒后强制关闭stream
    setTimeout(() => {
        if (currentEventSource) {
            log('扫描超时，强制结束', 'error');
            es.close();
            currentEventSource = null;
            btn.disabled = false;
            btn.textContent = '手动触发扫描';
        }
    }, 60000);
}
</script>
{% endblock %}
