{% extends "base.html" %}

{% block content %}
<div class="stat-grid">
    <div class="stat-card">
        <div class="stat-value {% if overview.total_profit >= 0 %}profit{% else %}loss{% endif %}">
            {{ "%.2f"|format(overview.total_profit) }}
        </div>
        <div class="stat-label">累计收益（元）</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">{{ "%.1f"|format(overview.win_rate) }}%</div>
        <div class="stat-label">历史胜率</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">{{ overview.total_trades }}</div>
        <div class="stat-label">总成交笔数</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">{{ overview.pending_count }}</div>
        <div class="stat-label">当前持仓</div>
    </div>
</div>

<div class="card" style="margin-top: 20px;">
    <h2>扫描监控</h2>
    <p id="currentSettings" style="margin-bottom:8px;color:#888;font-size:13px;">
        加载中...
    </p>
    <button id="scanBtn" class="btn btn-primary" onclick="triggerScan()"
            style="margin-top: 5px;">手动触发扫描</button>
    <div id="scanProgress" style="margin-top: 15px; display: none;">
        <div id="scanStatus" style="margin-bottom: 8px; color: #555; font-size: 14px;"></div>
        <div id="progressBar" style="height: 6px; background: #eee; border-radius: 3px;">
            <div id="progressFill" style="height: 100%; background: #3498db; border-radius: 3px; width: 0%; transition: width 0.3s;"></div>
        </div>
        <div id="logContainer" style="margin-top: 12px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px;">
        </div>
    </div>
    <div id="scanResult" style="margin-top: 15px; display: none;"></div>
</div>

<div class="card">
    <h2>快速操作</h2>
    <p><a href="/holdings">管理底仓</a> | <a href="/signals">查看信号</a> | <a href="/trades">成交记录</a></p>
</div>

<script>
let currentEventSource = null;

// 加载并显示当前设置
async function loadCurrentSettings() {
    try {
        const res = await fetch('/api/settings');
        const s = await res.json();
        const modeText = s.scan_mode === 'all' ? '全市场转债' : '仅持仓正股';
        document.getElementById('currentSettings').textContent =
            `当前模式: ${modeText} | 折价阈值: ${s.discount_threshold}% | 每次买入: ${s.target_lot_size}张`;
    } catch (e) {
        document.getElementById('currentSettings').textContent = '设置加载失败';
    }
}
loadCurrentSettings();

function log(message, type) {
    const container = document.getElementById('logContainer');
    const line = document.createElement('div');
    line.style.padding = '3px 0';
    line.style.borderBottom = '1px solid #f0f0f0';
    if (type === 'error') {
        line.style.color = '#e74c3c';
    } else if (type === 'success') {
        line.style.color = '#27ae60';
    } else if (type === 'signal') {
        line.style.color = '#27ae60';
        line.style.fontWeight = 'bold';
    } else {
        line.style.color = '#777';
    }
    const time = new Date().toLocaleTimeString('zh-CN');
    line.textContent = `[${time}] ${message}`;
    container.appendChild(line);
    container.scrollTop = container.scrollHeight;
}

function triggerScan() {
    if (currentEventSource) {
        currentEventSource.close();
    }
    if (!confirm('确定要触发一次扫描吗？')) return;

    const btn = document.getElementById('scanBtn');
    const progressDiv = document.getElementById('scanProgress');
    const resultDiv = document.getElementById('scanResult');
    const statusDiv = document.getElementById('scanStatus');
    const progressFill = document.getElementById('progressFill');
    const logContainer = document.getElementById('logContainer');

    btn.disabled = true;
    btn.textContent = '扫描中...';
    progressDiv.style.display = 'block';
    resultDiv.style.display = 'none';
    logContainer.innerHTML = '';
    statusDiv.textContent = '正在连接...';
    progressFill.style.width = '0%';

    const es = new EventSource('/api/signals/scan-stream');
    currentEventSource = es;
    let finalResult = null;

    es.addEventListener('start', function(e) {
        const data = JSON.parse(e.data);
        statusDiv.textContent = data.message;
        log(data.message);
        loadCurrentSettings(); // 刷新显示最新设置
    });

    es.addEventListener('step', function(e) {
        const step = JSON.parse(e.data);
        log(step.message);

        if (step.status === 'signal_found') {
            log(`  → 已加入买入计划：买${step.cb_name} ${step.target_shares || 10}张 @ ${step.cb_price}`, 'signal');
        }

        const pct = Math.round((step.step / step.total) * 100);
        progressFill.style.width = pct + '%';
        statusDiv.textContent = `正在扫描 ${step.step}/${step.total}：${step.stock_code}`;
    });

    es.addEventListener('done', function(e) {
        const data = JSON.parse(e.data);
        finalResult = data;
        progressFill.style.width = '100%';
        statusDiv.textContent = '扫描完成';
        btn.disabled = false;
        btn.textContent = '手动触发扫描';
        es.close();
        currentEventSource = null;
    });

    es.onerror = function() {
        es.close();
        currentEventSource = null;
        if (finalResult) {
            btn.disabled = false;
            btn.textContent = '手动触发扫描';

            const resultDiv2 = document.getElementById('scanResult');
            resultDiv2.style.display = 'block';
            if (finalResult.signals_found > 0) {
                let html = `<p class="profit"><strong>扫描完成，发现 ${finalResult.signals_found} 个信号，已模拟买入：</strong></p>`;
                html += '<table style="margin-top:10px;width:100%"><thead><tr><th>转债</th><th>类型</th><th>买价</th><th>张数</th><th>溢价率</th><th>折价空间</th></tr></thead><tbody>';
                for (const t of finalResult.trades) {
                    const tradeTypeLabel = t.trade_type === 'NAKED'
                        ? '<span style="background:#f39c12;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">裸套</span>'
                        : '<span style="background:#27ae60;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">对冲</span>';
                    html += `<tr>
                        <td>${t.cb_name} (${t.cb_code})</td>
                        <td>${tradeTypeLabel}</td>
                        <td>${t.buy_price}</td>
                        <td>${t.buy_shares}</td>
                        <td class="${t.premium_rate < 0 ? 'profit' : 'loss'}">${t.premium_rate.toFixed(2)}%</td>
                        <td>${t.discount_space.toFixed(2)}</td>
                    </tr>`;
                }
                html += '</tbody></table>';
                resultDiv2.innerHTML = html;
            } else {
                resultDiv2.innerHTML = '<p>扫描完成，今日无符合条件信号（折价率需 &lt; -1%）</p>';
            }
        } else {
            btn.disabled = false;
            btn.textContent = '手动触发扫描';
            log('连接中断', 'error');
        }
    };

    // 超时兜底：60秒后强制关闭stream
    setTimeout(() => {
        if (currentEventSource) {
            log('扫描超时，强制结束', 'error');
            es.close();
            currentEventSource = null;
            btn.disabled = false;
            btn.textContent = '手动触发扫描';
        }
    }, 60000);
}
</script>
{% endblock %}
