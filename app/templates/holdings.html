{% extends "base.html" %}

{% block content %}
<h1>底仓管理</h1>

<div class="card">
    <h2>添加底仓</h2>
    <form id="addForm">
        <div class="form-group">
            <label>正股代码</label>
            <input type="text" id="stock_code" name="stock_code" placeholder="如 000001" required>
        </div>
        <div class="form-group">
            <label>正股名称</label>
            <input type="text" id="stock_name" name="stock_name" placeholder="如 平安银行" required>
        </div>
        <div class="form-group">
            <label>持股数量</label>
            <input type="number" name="shares" step="0.01" required>
        </div>
        <div class="form-group">
            <label>成本价</label>
            <input type="number" name="cost_price" step="0.001" required>
        </div>
        <button type="submit" class="btn btn-primary">添加</button>
    </form>
</div>

<div class="card">
    <h2>当前底仓 <button class="btn btn-danger btn-sm" onclick="deleteAllHoldings()" style="margin-left:10px;">全部删除</button></h2>
    <table id="holdingsTable">
        <thead>
            <tr>
                <th data-sort="code">代码</th>
                <th data-sort="name">名称</th>
                <th data-sort="shares">持股数</th>
                <th data-sort="cost">成本价</th>
                <th data-sort="cb_code">转债代码</th>
                <th data-sort="cb_name">转债名称</th>
                <th data-sort="cb_price">转债价</th>
                <th data-sort="stock_price">正股价</th>
                <th data-sort="premium">溢价率</th>
                <th data-sort="discount">折价空间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="holdingsBody">
            <tr><td colspan="11">加载中...</td></tr>
        </tbody>
    </table>
</div>

<script>
let sortState = { holdingsTable: { column: 'code', direction: 'asc' } };

function makeSortable(tableId, defaultCol, defaultDir) {
    sortState[tableId] = { column: defaultCol, direction: defaultDir };
    const headers = document.querySelectorAll(`#${tableId} th[data-sort]`);
    headers.forEach(th => {
        th.style.cursor = 'pointer';
        th.title = '点击排序';
        th.addEventListener('click', () => {
            const col = th.dataset.sort;
            if (sortState[tableId].column === col) {
                sortState[tableId].direction = sortState[tableId].direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState[tableId] = { column: col, direction: 'asc' };
            }
            sortTable(tableId, col, sortState[tableId].direction);
        });
        if (!th.querySelector('.sort-indicator')) {
            th.innerHTML += ' <span class="sort-indicator" style="font-size:10px;color:#ccc;"></span>';
        }
    });
    const defaultHeader = document.querySelector(`#${tableId} th[data-sort="${defaultCol}"] .sort-indicator`);
    if (defaultHeader) defaultHeader.textContent = defaultDir === 'asc' ? ' ▲' : ' ▼';
}

function sortTable(tableId, col, direction) {
    const tbody = document.querySelector(`#${tableId} tbody`);
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const colIndex = Array.from(document.querySelectorAll(`#${tableId} th[data-sort]`)).findIndex(th => th.dataset.sort === col);

    rows.sort((a, b) => {
        let aVal = a.cells[colIndex]?.textContent.trim() || '';
        let bVal = b.cells[colIndex]?.textContent.trim() || '';
        const aNum = parseFloat(aVal.replace(/[^\d.-]/g, ''));
        const bNum = parseFloat(bVal.replace(/[^\d.-]/g, ''));
        if (!isNaN(aNum) && !isNaN(bNum)) {
            return direction === 'asc' ? aNum - bNum : bNum - aNum;
        }
        return direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    });

    rows.forEach(row => tbody.appendChild(row));
    document.querySelectorAll(`#${tableId} th .sort-indicator`).forEach(el => el.textContent = '');
    const activeHeader = document.querySelector(`#${tableId} th[data-sort="${col}"] .sort-indicator`);
    if (activeHeader) activeHeader.textContent = direction === 'asc' ? ' ▲' : ' ▼';
}

async function loadHoldings() {
    try {
    const res = await fetch('/api/holdings');
    const holdings = await res.json();
    const tbody = document.getElementById('holdingsBody');

    if (holdings.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11">暂无底仓</td></tr>';
        setTimeout(() => makeSortable('holdingsTable', 'code', 'asc'), 0);
        return;
    }

    // 并行查询每只正股的转债信息（带10秒超时）
    const codes = holdings.map(h => h.stock_code).join(',');
    const lookupRes = await fetch(`/api/holdings/lookup-batch?codes=${codes}`, { signal: AbortSignal.timeout(10000) });
    const lookupData = await lookupRes.json();
    const lookupMap = {};
    for (const item of lookupData) {
        lookupMap[item.stock_code] = item;
    }

    tbody.innerHTML = holdings.map(h => {
        const info = lookupMap[h.stock_code] || {};
        const cb = info.cb || {};
        const premiumColor = cb.premium_rate < 0 ? 'profit' : (cb.premium_rate > 0 ? 'loss' : '');
        const discountSpace = cb.discount_space != null ? cb.discount_space.toFixed(2) : '—';
        return `
        <tr>
            <td>${h.stock_code}</td>
            <td>${h.stock_name}</td>
            <td>${h.shares}</td>
            <td>${h.cost_price}</td>
            <td>${cb.cb_code || '—'}</td>
            <td>${cb.cb_name || '—'}</td>
            <td>${cb.cb_price != null ? cb.cb_price : '—'}</td>
            <td>${info.stock_price != null ? info.stock_price : '—'}</td>
            <td class="${premiumColor}">${cb.premium_rate != null ? cb.premium_rate.toFixed(2) + '%' : '—'}</td>
            <td class="${cb.discount_space > 0 ? 'profit' : ''}">${discountSpace}</td>
            <td>
                <button class="btn btn-danger" onclick="deleteHolding(${h.id})">删除</button>
            </td>
        </tr>
    `}).join('');
    setTimeout(() => makeSortable('holdingsTable', 'code', 'asc'), 0);
    } catch (err) {
        const tbody = document.getElementById('holdingsBody');
        tbody.innerHTML = '<tr><td colspan="11">加载失败: ' + err.message + '</td></tr>';
    }
}

document.getElementById('addForm').onsubmit = async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const body = Object.fromEntries(form.entries());
    await fetch('/api/holdings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
    e.target.reset();
    loadHoldings();
};

async function deleteHolding(id) {
    if (!confirm('确认删除？')) return;
    await fetch(`/api/holdings/${id}`, { method: 'DELETE' });
    loadHoldings();
}

async function deleteAllHoldings() {
    if (!confirm('确认删除全部底仓？')) return;
    await fetch(`/api/holdings`, { method: 'DELETE' });
    loadHoldings();
}

// 自动填充股票名称
const codeInput = document.getElementById('stock_code');
const nameInput = document.getElementById('stock_name');

function autoFillName() {
    const code = codeInput.value.trim();
    if (!code || code.length < 6) return;
    fetch(`/api/holdings/lookup?code=${code}`)
        .then(r => r.json())
        .then(data => {
            if (data.found && data.stock_name) {
                nameInput.value = data.stock_name;
            }
        })
        .catch(() => {});
}

codeInput.addEventListener('blur', autoFillName);
codeInput.addEventListener('change', autoFillName);

loadHoldings();
</script>
{% endblock %}
