{% extends "base.html" %}

{% block content %}
<h1>套利信号记录</h1>

<div class="card" style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
    <button class="btn btn-primary" onclick="reviewAllNaked()">复盘全部裸套</button>
    <button class="btn btn-danger" onclick="deleteAll()">清空全部</button>
</div>

<div class="card">
    <table id="signalsTable">
        <thead>
            <tr>
                <th data-sort="signal_time">时间</th>
                <th data-sort="cb">转债</th>
                <th data-sort="stock">正股</th>
                <th data-sort="stockPrice">正股价</th>
                <th data-sort="holdings">底仓</th>
                <th data-sort="strategy">策略</th>
                <th data-sort="premium">溢价率</th>
                <th data-sort="discount">折价空间</th>
                <th data-sort="buyPrice">目标买入价</th>
                <th data-sort="shares">张数</th>
                <th data-sort="cost">预估成本</th>
                <th data-sort="profit">预估收益</th>
                <th data-sort="profitRate">收益率</th>
                <th data-sort="risk">风险</th>
                <th data-sort="nextPrice">隔日开盘价</th>
                <th data-sort="actualProfit">实际收益</th>
                <th data-sort="realtimePrice">实时复盘价</th>
                <th data-sort="realtimeActualProfit">实时实际收益</th>
                <th data-sort="realtimeActualProfitRate">实时收益率</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="signalsBody">
            <tr><td colspan="19">加载中...</td></tr>
        </tbody>
    </table>
</div>

<script>
let sortState = { signalsTable: { column: 'signal_time', direction: 'desc' } };

function makeSortable(tableId, defaultCol, defaultDir) {
    sortState[tableId] = { column: defaultCol, direction: defaultDir };
    const headers = document.querySelectorAll(`#${tableId} th[data-sort]`);
    headers.forEach(th => {
        th.style.cursor = 'pointer';
        th.title = '点击排序';
        th.addEventListener('click', () => {
            const col = th.dataset.sort;
            if (sortState[tableId].column === col) {
                sortState[tableId].direction = sortState[tableId].direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState[tableId] = { column: col, direction: 'asc' };
            }
            sortTable(tableId, col, sortState[tableId].direction);
        });
        if (!th.querySelector('.sort-indicator')) {
            th.innerHTML += ' <span class="sort-indicator" style="font-size:10px;color:#ccc;"></span>';
        }
    });
    const defaultHeader = document.querySelector(`#${tableId} th[data-sort="${defaultCol}"] .sort-indicator`);
    if (defaultHeader) defaultHeader.textContent = defaultDir === 'asc' ? ' ▲' : ' ▼';
}

function sortTable(tableId, col, direction) {
    const tbody = document.querySelector(`#${tableId} tbody`);
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const colIndex = Array.from(document.querySelectorAll(`#${tableId} th[data-sort]`)).findIndex(th => th.dataset.sort === col);

    rows.sort((a, b) => {
        let aVal = a.cells[colIndex]?.textContent.trim() || '';
        let bVal = b.cells[colIndex]?.textContent.trim() || '';
        const aNum = parseFloat(aVal.replace(/[^\d.-]/g, ''));
        const bNum = parseFloat(bVal.replace(/[^\d.-]/g, ''));
        if (!isNaN(aNum) && !isNaN(bNum)) {
            return direction === 'asc' ? aNum - bNum : bNum - aNum;
        }
        return direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    });

    rows.forEach(row => tbody.appendChild(row));
    document.querySelectorAll(`#${tableId} th .sort-indicator`).forEach(el => el.textContent = '');
    const activeHeader = document.querySelector(`#${tableId} th[data-sort="${col}"] .sort-indicator`);
    if (activeHeader) activeHeader.textContent = direction === 'asc' ? ' ▲' : ' ▼';
}

async function loadSignals() {
    const res = await fetch('/api/signals?limit=100');
    const data = await res.json();
    const tbody = document.getElementById('signalsBody');
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="18">暂无信号</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(s => {
        const buyPrice = s.target_buy_price || s.cb_price || 0;
        const targetShares = s.target_shares || 0;
        const stockPrice = s.stock_price || 0;
        const conversionPrice = s.conversion_price || 1;
        const tradeType = s.trade_type || 'HEDGE';
        const hasHoldings = s.has_holdings;

        const holdingsBadge = hasHoldings
            ? '<span style="background:#27ae60;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">有</span>'
            : '<span style="background:#bbb;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">无</span>';

        let cost = 0, profit = 0, riskLevel = '', steps = '-', strategyLabel = '';
        const cbAmount = buyPrice * targetShares;
        const sharesFromCb = (targetShares * 100.0) / conversionPrice;

        if (tradeType === 'HEDGE') {
            const stockSellAmount = stockPrice * sharesFromCb;
            const cbFee = cbAmount * 0.00006 * 2;
            const stockFee = stockSellAmount * 0.0001;
            const stampTax = stockSellAmount * 0.0015;
            cost = cbAmount + cbFee + stockFee + stampTax;
            profit = stockSellAmount - cost;
            riskLevel = '<span style="color:#27ae60;">低</span>';
            steps = '买入CB → 转股 → 卖出正股';
            strategyLabel = '<span style="background:#27ae60;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">对冲</span>';
        } else if (tradeType === 'SHORT') {
            const loanSellAmount = stockPrice * sharesFromCb;
            const cbFee = cbAmount * 0.00006;
            const loanFee = loanSellAmount * 0.0001;
            const interest = loanSellAmount * 0.00022 * 1;
            cost = cbAmount + cbFee + loanFee + interest;
            profit = loanSellAmount - cost;
            riskLevel = '<span style="color:#27ae60;">低</span>';
            steps = '买入CB → 申请融券卖出正股 → 转股归还融券';
            strategyLabel = '<span style="background:#3498db;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">融券</span>';
        } else {
            const stockSellAmount = stockPrice * sharesFromCb;
            const cbFee = cbAmount * 0.00006;
            const stockFee = stockSellAmount * 0.0001;
            cost = cbAmount + cbFee + stockFee;
            profit = stockSellAmount - cost;
            riskLevel = '<span style="color:#e74c3c;">高</span>';
            steps = '买入CB → 转股 → 次日卖出正股（注意隔夜风险）';
            strategyLabel = '<span style="background:#f39c12;color:#fff;padding:1px 4px;border-radius:3px;font-size:11px;">裸套</span>';
        }

        const profitRate = cost > 0 ? (profit / cost * 100).toFixed(2) + '%' : '-';
        const premium = s.premium_rate != null ? s.premium_rate.toFixed(2) + '%' : '-';
        const discount = s.discount_space != null ? s.discount_space.toFixed(2) : '-';
        const cbInfo = s.cb_name ? `${s.cb_name} (${s.cb_code})` : (s.cb_code || '-');
        const stockInfo = s.stock_name ? `${s.stock_name} (${s.stock_code})` : (s.stock_code || '-');
        const isProfit = profit >= 0;
        const statusColor = s.status === 'EXECUTED' ? 'profit' : s.status === 'PENDING' ? '' : 'loss';
        const isNaked = tradeType === 'NAKED';
        const hasNextDay = s.next_day_open_price != null;
        const actualProfitClass = s.actual_profit > 0 ? 'profit' : s.actual_profit < 0 ? 'loss' : '';
        const actions = `<button class="btn btn-danger btn-sm" onclick="deleteSignal(${s.id})">删除</button>`;

        return `<tr>
            <td>${s.signal_time ? s.signal_time.slice(0, 19) : '-'}</td>
            <td>${cbInfo}</td>
            <td>${stockInfo}</td>
            <td>${stockPrice > 0 ? stockPrice.toFixed(2) : '-'}</td>
            <td>${holdingsBadge}</td>
            <td>${strategyLabel}</td>
            <td class="${s.premium_rate < 0 ? 'profit' : 'loss'}">${premium}</td>
            <td>${discount}</td>
            <td>${buyPrice > 0 ? buyPrice.toFixed(2) : '-'}</td>
            <td>${targetShares > 0 ? targetShares : '-'}</td>
            <td>${cost > 0 ? cost.toFixed(2) : '-'}</td>
            <td class="${cost > 0 ? (isProfit ? 'profit' : 'loss') : ''}">${cost > 0 ? profit.toFixed(2) : '-'}</td>
            <td class="${cost > 0 ? (isProfit ? 'profit' : 'loss') : ''}">${profitRate}</td>
            <td>${riskLevel}</td>
            <td>${hasNextDay ? s.next_day_open_price.toFixed(2) : '-'}</td>
            <td class="${actualProfitClass}">${s.actual_profit != null ? s.actual_profit.toFixed(2) : '-'}</td>
            <td>${s.realtime_review_price ? s.realtime_review_price.toFixed(2) : '-'}</td>
            <td class="${s.realtime_actual_profit > 0 ? 'profit' : s.realtime_actual_profit < 0 ? 'loss' : ''}">${s.realtime_actual_profit != null ? s.realtime_actual_profit.toFixed(2) : '-'}</td>
            <td class="${s.realtime_actual_profit_rate > 0 ? 'profit' : s.realtime_actual_profit_rate < 0 ? 'loss' : ''}">${s.realtime_actual_profit_rate != null ? s.realtime_actual_profit_rate.toFixed(2) + '%' : '-'}</td>
            <td>${actions}</td>
        </tr>`;
    }).join('');
    setTimeout(() => makeSortable('signalsTable', 'signal_time', 'desc'), 0);
}

async function reviewSignal(signalId) {
    // 查找当前行信号，看是否已有隔日开盘价
    const rows = document.querySelectorAll('#signalsBody tr');
    let hasNextDay = false;
    for (const row of rows) {
        const cells = row.querySelectorAll('td');
        if (cells.length >= 16 && cells[16].querySelector('button')?.textContent.includes('复盘')) {
            // 判断该信号的隔日开盘价列是否有值
            const nextDayCell = cells[14];
            hasNextDay = nextDayCell && nextDayCell.textContent.trim() !== '-';
            break;
        }
    }

    let body = {};
    if (!hasNextDay) {
        const price = prompt('请输入隔日开盘价（正股价格）：');
        if (!price) return;
        body = { next_day_open_price: parseFloat(price) };
    }

    const res = await fetch(`/api/signals/review/${signalId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (!res.ok) {
        const err = await res.json();
        alert('复盘失败: ' + (err.detail || err.message));
        return;
    }
    loadSignals();
}

async function deleteSignal(id) {
    if (!confirm('确认删除该信号？')) return;
    await fetch(`/api/signals/${id}`, { method: 'DELETE' });
    loadSignals();
}

async function deleteAll() {
    if (!confirm('确认清空全部信号记录？此操作不可恢复。')) return;
    await fetch('/api/signals', { method: 'DELETE' });
    loadSignals();
}

async function reviewAllNaked() {
    if (!confirm('将对所有历史裸套信号进行复盘（获取真实隔日开盘价和实时价格），是否继续？')) return;
    const res = await fetch('/api/signals/review-all', { method: 'POST' });
    const result = await res.json();
    alert(`复盘完成：${result.updated} 条信号已更新`);
    loadSignals();
}

loadSignals();
</script>
{% endblock %}
