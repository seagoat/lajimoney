{% extends "base.html" %}

{% block content %}
<h1>模拟成交记录</h1>

<div class="card" style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
    <button class="btn btn-danger" onclick="deleteAll()">清空全部</button>
</div>

<div class="card">
    <table id="tradesTable">
        <thead>
            <tr>
                <th data-sort="buy_time">买入时间</th>
                <th data-sort="cb">转债</th>
                <th data-sort="buy_price">买价</th>
                <th data-sort="buy_shares">张数</th>
                <th data-sort="buy_amount">买入金额</th>
                <th data-sort="sell_price">卖价</th>
                <th data-sort="sell_amount">卖出金额</th>
                <th data-sort="profit">收益</th>
                <th data-sort="profit_rate">收益率</th>
                <th data-sort="status">状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tradesBody">
            <tr><td colspan="11">加载中...</td></tr>
        </tbody>
    </table>
</div>

<script>
let sortState = { tradesTable: { column: 'buy_time', direction: 'desc' } };

function makeSortable(tableId, defaultCol, defaultDir) {
    sortState[tableId] = { column: defaultCol, direction: defaultDir };
    const headers = document.querySelectorAll(`#${tableId} th[data-sort]`);
    headers.forEach(th => {
        th.style.cursor = 'pointer';
        th.title = '点击排序';
        th.addEventListener('click', () => {
            const col = th.dataset.sort;
            if (sortState[tableId].column === col) {
                sortState[tableId].direction = sortState[tableId].direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState[tableId] = { column: col, direction: 'asc' };
            }
            sortTable(tableId, col, sortState[tableId].direction);
        });
        if (!th.querySelector('.sort-indicator')) {
            th.innerHTML += ' <span class="sort-indicator" style="font-size:10px;color:#ccc;"></span>';
        }
    });
    const defaultHeader = document.querySelector(`#${tableId} th[data-sort="${defaultCol}"] .sort-indicator`);
    if (defaultHeader) defaultHeader.textContent = defaultDir === 'asc' ? ' ▲' : ' ▼';
}

function sortTable(tableId, col, direction) {
    const tbody = document.querySelector(`#${tableId} tbody`);
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const colIndex = Array.from(document.querySelectorAll(`#${tableId} th[data-sort]`)).findIndex(th => th.dataset.sort === col);

    rows.sort((a, b) => {
        let aVal = a.cells[colIndex]?.textContent.trim() || '';
        let bVal = b.cells[colIndex]?.textContent.trim() || '';
        const aNum = parseFloat(aVal.replace(/[^\d.-]/g, ''));
        const bNum = parseFloat(bVal.replace(/[^\d.-]/g, ''));
        if (!isNaN(aNum) && !isNaN(bNum)) {
            return direction === 'asc' ? aNum - bNum : bNum - aNum;
        }
        return direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
    });

    rows.forEach(row => tbody.appendChild(row));
    document.querySelectorAll(`#${tableId} th .sort-indicator`).forEach(el => el.textContent = '');
    const activeHeader = document.querySelector(`#${tableId} th[data-sort="${col}"] .sort-indicator`);
    if (activeHeader) activeHeader.textContent = direction === 'asc' ? ' ▲' : ' ▼';
}

async function loadTrades() {
    const res = await fetch('/api/trades?limit=100');
    const data = await res.json();
    const tbody = document.getElementById('tradesBody');
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11">暂无记录</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(t => {
        const profit = t.profit != null ? t.profit.toFixed(2) : '-';
        const profitRate = t.profit_rate != null ? t.profit_rate.toFixed(2) + '%' : '-';
        const profitClass = t.profit > 0 ? 'profit' : t.profit < 0 ? 'loss' : '';
        return `<tr>
            <td>${t.buy_time ? t.buy_time.slice(0, 19) : '-'}</td>
            <td>${t.cb_name || t.cb_code || '-'}</td>
            <td>${t.buy_price || '-'}</td>
            <td>${t.buy_shares || '-'}</td>
            <td>${t.buy_amount != null ? t.buy_amount.toFixed(2) : '-'}</td>
            <td>${t.sell_price || '-'}</td>
            <td>${t.sell_amount != null ? t.sell_amount.toFixed(2) : '-'}</td>
            <td class="${profitClass}">${profit}</td>
            <td class="${profitClass}">${profitRate}</td>
            <td>${t.status}</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteTrade(${t.id})">删除</button></td>
        </tr>`;
    }).join('');
    setTimeout(() => makeSortable('tradesTable', 'buy_time', 'desc'), 0);
}

async function deleteTrade(id) {
    if (!confirm('确认删除该成交记录？')) return;
    await fetch(`/api/trades/${id}`, { method: 'DELETE' });
    loadTrades();
}

async function deleteAll() {
    if (!confirm('确认清空全部成交记录？此操作不可恢复。')) return;
    await fetch('/api/trades', { method: 'DELETE' });
    loadTrades();
}

loadTrades();
</script>
{% endblock %}
